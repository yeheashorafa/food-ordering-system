services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: food-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8080:8080"
      - "9091:9091"

  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant-service
    ports:
      - "8081:8081"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      RABBITMQ_HOST: rabbitmq
      CUSTOMER_SERVICE_URL: http://customer-service:8080
      RESTAURANT_SERVICE_URL: http://restaurant-service:8081
      GRPC_CUSTOMER_HOST: customer-service
      GRPC_CUSTOMER_PORT: 9091
    depends_on:
      - rabbitmq
      - customer-service
      - restaurant-service

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8083:8083"
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  delivery-service:
    build: ./delivery-service
    container_name: delivery-service
    ports:
      - "8084:8084"
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8088:8088"
    environment:
      ORDER_SERVICE_URL: http://order-service:8082
      CUSTOMER_SERVICE_URL: http://customer-service:8080
      RESTAURANT_SERVICE_URL: http://restaurant-service:8081
    depends_on:
      - order-service
      - customer-service
      - restaurant-service

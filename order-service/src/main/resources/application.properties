spring.application.name=order-service
server.port=8082
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
customer.service.url=${CUSTOMER_SERVICE_URL:http://localhost:8080}
restaurant.service.url=${RESTAURANT_SERVICE_URL:http://localhost:8081}
grpc.customer.host=${GRPC_CUSTOMER_HOST:localhost}
grpc.customer.port=${GRPC_CUSTOMER_PORT:9091}
spring.graphql.graphiql.enabled=true
spring.h2.console.settings.web-allow-others=true
spring.h2.console.path=/h2-console
